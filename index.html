            哀鸽又称泣鸽，是北美分布极广的鸠鸽,
            体长二三十厘米，通体浅褐，翅带黑斑，尾尖长，
            雄鸟颈侧有紫彩斑。
            因低沉绵长、似呜咽的叫声得名，
            主食各类植物种子，多在地面觅食。
            实行一夫一妻，每窝产两枚白蛋，雌雄共同育雏。
            适应力强，农田、居民区均能栖息，起飞时翅膀会发出独特哨音。
